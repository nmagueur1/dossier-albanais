<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familja Berisha - Accès Restreint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --dark:  #0f0f0f;
      --red:   #8b0000;
      --gold:  #c9a84c;
      --gold-light: #e0c070;
      --white: #f2f0eb;
      --gray:  #4a4a4a;
      --gray-light: #888;
      --border: rgba(255,255,255,.07);
      --cormorant: 'Cormorant Garamond', serif;
      --montserrat: 'Montserrat', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--montserrat);
      overflow: hidden;
    }

    /* ─── Background grid ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(139,0,0,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,0,0,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Vignette ─── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.75) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Gate wrapper ─── */
    .gate {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      padding: 2rem;
      text-align: center;
      animation: fadeIn .8s ease both;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes pulse { 0%,100% { opacity:.6; } 50% { opacity:1; } }

    /* ─── Eagle / icon ─── */
    .gate-eagle {
      font-size: 2.2rem;
      margin-bottom: 1.5rem;
      animation: pulse 3s ease-in-out infinite;
    }

    /* ─── Logo ─── */
    .gate-logo {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: .75rem;
    }
    .gate-logo-box {
      width: 38px; height: 38px;
      border: 1px solid rgba(201,168,76,.4);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--cormorant);
      font-size: 1.3rem; font-weight: 600;
      color: var(--gold);
      background: rgba(201,168,76,.05);
    }
    .gate-logo-text strong {
      display: block;
      font-size: .65rem; letter-spacing: .35em;
      text-transform: uppercase; color: var(--white);
    }
    .gate-logo-text small {
      font-size: .52rem; letter-spacing: .25em;
      text-transform: uppercase; color: var(--gray-light);
    }

    /* ─── Divider ─── */
    .gate-divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.5rem auto;
      opacity: .5;
    }

    /* ─── Title ─── */
    .gate-title {
      font-family: var(--cormorant);
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 400;
      font-style: italic;
      color: rgba(242,240,235,.45);
      letter-spacing: .04em;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    /* ─── Input zone ─── */
    .gate-form {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      width: 100%; max-width: 300px;
    }

    .gate-input-wrap {
      position: relative; width: 100%;
    }
    .gate-input {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-bottom: 1px solid rgba(201,168,76,.25);
      color: var(--white);
      font-family: var(--montserrat);
      font-size: .78rem;
      letter-spacing: .2em;
      padding: .9rem 3rem .9rem 1.25rem;
      outline: none;
      text-align: center;
      transition: border-color .3s, background .3s;
    }
    .gate-input::placeholder { color: var(--gray); letter-spacing: .2em; }
    .gate-input:focus {
      border-color: rgba(201,168,76,.5);
      background: rgba(255,255,255,.05);
    }
    .gate-input.error { border-color: rgba(139,0,0,.6); animation: shake .3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* Eye toggle */
    .gate-eye {
      position: absolute; right: .9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--gray); font-size: .8rem; padding: 0;
      transition: color .2s;
    }
    .gate-eye:hover { color: var(--gold); }

    /* Submit */
    .gate-btn {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(201,168,76,.35);
      color: var(--gold);
      font-family: var(--montserrat);
      font-size: .6rem; letter-spacing: .35em;
      text-transform: uppercase;
      padding: .85rem 2rem;
      cursor: pointer;
      transition: all .3s;
      position: relative; overflow: hidden;
    }
    .gate-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,.08), transparent);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .gate-btn:hover { border-color: var(--gold); color: var(--white); }
    .gate-btn:hover::before { transform: translateX(100%); }

    /* ─── Error message ─── */
    .gate-error {
      font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
      color: #c0392b; margin-top: .25rem;
      opacity: 0; transition: opacity .3s;
      min-height: 1rem;
    }
    .gate-error.visible { opacity: 1; }

    /* ─── Footer quote ─── */
    .gate-quote {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      font-family: var(--cormorant);
      font-style: italic;
      font-size: .85rem;
      color: rgba(242,240,235,.18);
      letter-spacing: .04em;
      white-space: nowrap;
    }

    /* ─── Corner decorations ─── */
    .corner { position: absolute; width: 12px; height: 12px; }
    .corner.tl { top: -1px; left: -1px; border-top: 1px solid rgba(201,168,76,.3); border-left: 1px solid rgba(201,168,76,.3); }
    .corner.tr { top: -1px; right: -1px; border-top: 1px solid rgba(201,168,76,.3); border-right: 1px solid rgba(201,168,76,.3); }
    .corner.bl { bottom: -1px; left: -1px; border-bottom: 1px solid rgba(201,168,76,.3); border-left: 1px solid rgba(201,168,76,.3); }
    .corner.br { bottom: -1px; right: -1px; border-bottom: 1px solid rgba(201,168,76,.3); border-right: 1px solid rgba(201,168,76,.3); }

    .gate-card {
      position: relative;
      padding: 2.5rem 2rem;
      background: rgba(255,255,255,.018);
      border: 1px solid var(--border);
      width: 100%; max-width: 360px;
    }
  </style>
</head>
<body>

<div class="gate">

  <div class="gate-eagle">🦅</div>

  <div class="gate-logo">
    <div class="gate-logo-box">B</div>
    <div class="gate-logo-text">
      <strong>Familja Berisha</strong>
      <small>Los Santos</small>
    </div>
  </div>

  <div class="gate-divider"></div>

  <div class="gate-card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <p class="gate-title">
      "La Besa protège ceux qui méritent<br>d'entrer. Les autres restent dehors."
    </p>

    <form class="gate-form" onsubmit="checkPassword(event)">
      <div class="gate-input-wrap">
        <input
          class="gate-input"
          type="password"
          id="pwd"
          placeholder="••••••••"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="button" class="gate-eye" id="eyeBtn" onclick="toggleEye()">👁</button>
      </div>
      <p class="gate-error" id="errMsg">Mot de passe incorrect.</p>
      <button type="submit" class="gate-btn">Entrer</button>
    </form>
  </div>

</div>

<p class="gate-quote">"Ai që tradhëton familjen, tradhëton veten."</p>

<script>
  // ─── Mot de passe ─────────────────────────────────
  // Pour changer le mot de passe : modifier la valeur ci-dessous
  const PASSWORD = '1991';
  // ─────────────────────────────────────────────────

  // Déjà authentifié → passer directement
  if (sessionStorage.getItem('bsAuth') === '1') {
    location.replace('index.html');
  }

  function checkPassword(e) {
    e.preventDefault();
    const input = document.getElementById('pwd');
    const err   = document.getElementById('errMsg');

    if (input.value === PASSWORD) {
      sessionStorage.setItem('bsAuth', '1');
      // Fade out avant redirect
      document.querySelector('.gate').style.transition = 'opacity .4s';
      document.querySelector('.gate').style.opacity = '0';
      setTimeout(() => location.replace('index.html'), 400);
    } else {
      input.classList.add('error');
      err.classList.add('visible');
      input.value = '';
      input.focus();
      setTimeout(() => {
        input.classList.remove('error');
        err.classList.remove('visible');
      }, 2500);
    }
  }

  function toggleEye() {
    const input = document.getElementById('pwd');
    const btn   = document.getElementById('eyeBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  // Entrée au clavier
  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword(e);
  });
</script>

</body>
</html>
